<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPビュー — Scroll Orbit</title>
<style>
/* ══ Reset ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: auto; }
body {
  font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
  background: #081428;
  overflow-x: hidden;
}

/* ══ Scroll-line keyframe (Hero.tsx match) ══ */
@keyframes scrollLine {
  0%   { transform: translateY(-100%); opacity: 0; }
  40%  { opacity: 1; }
  100% { transform: translateY(200%); opacity: 0; }
}

/* ══ Spacer sections ══ */
.spacer {
  height: 60vh;
  display: flex; align-items: center; justify-content: center;
  background: #0b1830;
  color: rgba(255,255,255,0.18);
  font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
}

/* ══════════════════════════════════════════════════════════════
   HERO — pinned section
══════════════════════════════════════════════════════════════ */
#hero { /* GSAP adds spacer via pin */ }

.hero-frame {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  overflow: hidden;
}

/* ── Background layers (match Hero.tsx) ── */
.hero-frame::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #1A60C8 0%, #2196F3 45%, #42B4F8 72%, #72CBFF 100%);
}
.bg-grid {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 80px 80px;
}
.bg-vignette {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(8,35,100,0.28) 100%);
}
.bg-shadow-l {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(to right, rgba(10,40,110,0.22) 0%, transparent 50%);
}
.bg-spot {
  position: absolute; z-index: 0; pointer-events: none;
  top: 5%; right: 5%; width: 55%; height: 90%;
  background: radial-gradient(ellipse at 60% 45%, rgba(100,185,255,0.18) 0%, transparent 60%);
}

/* Decorative SVG circles */
.deco-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none; overflow: visible;
}

/* Watermark number */
.watermark {
  position: absolute; right: 2%; top: 50%; transform: translateY(-55%);
  font-size: clamp(140px, 18vw, 260px);
  font-weight: 900; color: rgba(255,255,255,0.045);
  line-height: 1; letter-spacing: -0.06em;
  z-index: 1; pointer-events: none; user-select: none;
  font-variant-numeric: tabular-nums;
  transition: opacity .32s ease;
}

/* ══ Content grid ══ */
.hero-grid {
  position: relative; z-index: 10;
  width: 100%; max-width: 1440px;
  margin: 0 auto;
  padding: 0 clamp(20px, 5vw, 80px);
  display: grid;
  grid-template-columns: 5fr 6fr;
  gap: clamp(24px, 4vw, 72px);
  align-items: center;
}

/* ── LEFT: catch copy ── */
.hero-left { color: #fff; }
.hero-h1 { font-weight: 700; line-height: 1.15; letter-spacing: 0.03em; margin-bottom: 20px; }
.h1-line { display: block; font-size: clamp(24px, 3.2vw, 48px); margin-bottom: 4px; }
.h1-charm {
  display: block; font-size: clamp(28px, 3.8vw, 56px);
  background: linear-gradient(90deg, #fff 0%, #7EC8F0 50%, #fff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: clamp(13px, 1vw, 15px); line-height: 1.9;
  color: rgba(255,255,255,0.70);
}

/* SCROLL indicator */
.scroll-ind {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.scroll-ind span {
  font-size: 10px; letter-spacing: 0.35em;
  color: rgba(255,255,255,0.50); text-transform: uppercase; font-weight: 300;
}
.scroll-line-box {
  width: 1px; height: 64px; overflow: hidden; position: relative;
  background: rgba(255,255,255,0.10);
}
.scroll-line-bar {
  position: absolute; top: 0; width: 100%; height: 60%;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.85), transparent);
  animation: scrollLine 1.8s ease-in-out infinite;
}

/* ══════════════════════════════════════════════════════════════
   RIGHT: orbit stage
══════════════════════════════════════════════════════════════ */
.hero-right { display: flex; justify-content: center; align-items: center; }

.orbit-stage {
  position: relative;
  width: 500px; height: 500px;
  flex-shrink: 0;
}

/* Responsive scaling */
@media (max-width: 1200px) { .orbit-stage { transform: scale(0.82); transform-origin: center; } }
@media (max-width: 900px)  {
  .hero-grid { grid-template-columns: 1fr; }
  .orbit-stage { transform: scale(0.65); transform-origin: top center; margin-top: -40px; }
}

/* SVG rings (static decoration — NOT rotated) */
.orbit-decor-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
}

/* Active-position beacon at 12 o'clock: (250, 250-170=80) */
.beacon {
  position: absolute;
  left: 250px; top: 80px;
  width: 16px; height: 16px; margin: -8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.80);
  box-shadow: 0 0 0 5px rgba(255,255,255,0.15), 0 0 18px 4px rgba(180,230,255,0.50);
  z-index: 5; pointer-events: none;
}

/* Center circle (text updates via JS) */
.orbit-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(140,205,255,0.52);
  border: 2px solid rgba(220,240,255,0.68);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; text-align: center;
  box-shadow: 0 0 32px rgba(100,180,255,0.22), inset 0 1px 0 rgba(255,255,255,0.20);
  z-index: 6;
}
.c-num   { font-size: 9px; letter-spacing: 0.25em; font-weight: 700; color: rgba(10,60,140,0.80); }
.c-title { font-size: 13px; font-weight: 800; color: #0D47A1; letter-spacing: 0.08em; }
.c-sub   { font-size: 7.5px; letter-spacing: 0.15em; color: rgba(10,60,140,0.55); text-transform: uppercase; }

/* ══════════════════════════════════════════════════════════════
   ORBIT RING (GSAP rotates this)
   — sits inside orbit-stage, fills it exactly (500×500)
   — transform-origin: 50% 50% = (250,250)
══════════════════════════════════════════════════════════════ */
.orbit-ring { position: absolute; inset: 0; }

/* ── Items ── */
/*
  Each item is a zero-size anchor at the ring center.
  CSS `rotate(--a) translateY(-170px)` places it on the circle.
  --a values: 0deg (top), 120deg (lower-right ~4 o'clock), 240deg (lower-left ~8 o'clock).
*/
.orbit-item {
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  overflow: visible;
  transform: rotate(var(--a)) translateY(-170px);
}

/*
  Inner: icon circle + label.
  GSAP counter-rotates this so content stays upright.
  transform-origin = center of the node circle = (60px, 50px)
  within the 120×160 bounding box.
*/
.orbit-inner {
  position: absolute;
  width: 120px; height: 160px;
  top: 0; left: 0;
  margin-top: -50px;
  margin-left: -60px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  transform-origin: 60px 50px;
  pointer-events: none;
}

/* Node circle */
.node-circle {
  width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0;
  background: rgba(140,205,255,0.52);
  border: 2px solid rgba(220,240,255,0.72);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  transition: background .40s, border-color .40s, box-shadow .40s, transform .40s;
}
.orbit-item.active .node-circle {
  background: rgba(200,238,255,0.74);
  border-color: rgba(255,255,255,0.92);
  box-shadow: 0 0 0 4px rgba(255,255,255,0.20), 0 0 28px rgba(180,228,255,0.60);
  transform: scale(1.16);
}
.orbit-item.dim .node-circle {
  background: rgba(140,205,255,0.28);
  border-color: rgba(220,240,255,0.36);
  opacity: 0.55;
}

/* Node label */
.node-name {
  font-size: 10.5px; line-height: 1.45;
  text-align: center; white-space: nowrap;
  color: rgba(255,255,255,0.85);
  transition: opacity .40s, font-weight .40s;
}
.orbit-item.active .node-name { color: #fff; font-weight: 600; }
.orbit-item.dim .node-name { opacity: 0.50; }
</style>
</head>
<body>

<!-- ── spacer ── -->
<div class="spacer">↓ &nbsp;Scroll Down&nbsp; ↓</div>

<!-- ══ HERO (pinned) ══ -->
<section id="hero">
  <div class="hero-frame">

    <!-- BG layers -->
    <div class="bg-grid"></div>
    <div class="bg-vignette"></div>
    <div class="bg-shadow-l"></div>
    <div class="bg-spot"></div>

    <svg class="deco-svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <circle cx="1200" cy="180" r="130" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <circle cx="1200" cy="180" r="220" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <circle cx="180"  cy="760" r="100" fill="none" stroke="rgba(0,144,210,0.10)"  stroke-width="1"/>
      <circle cx="180"  cy="760" r="180" fill="none" stroke="rgba(0,144,210,0.06)"  stroke-width="1"/>
    </svg>

    <!-- Watermark -->
    <div class="watermark" id="wm">01</div>

    <!-- ── Content ── -->
    <div class="hero-grid">

      <!-- LEFT -->
      <div class="hero-left">
        <h1 class="hero-h1">
          <span class="h1-line">What the future</span>
          <span class="h1-line">of IT needs is</span>
          <span class="h1-charm">&ldquo;charm.&rdquo;</span>
        </h1>
        <p class="hero-sub">
          デジタルトランスフォーメーションで<br>
          お客様のビジネスに新たな価値を。
        </p>
      </div>

      <!-- RIGHT -->
      <div class="hero-right">
        <div class="orbit-stage">

          <!-- Decorative SVG (static) -->
          <svg class="orbit-decor-svg" viewBox="0 0 500 500" fill="none">
            <circle cx="250" cy="250" r="235" fill="rgba(60,130,240,0.12)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
            <circle cx="250" cy="250" r="170" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="5 9"/>
            <!-- Active arc at 12 o'clock: rotate(-93°) centres a 36px arc at top -->
            <circle cx="250" cy="250" r="170"
                    stroke="rgba(255,255,255,0.62)" stroke-width="3"
                    stroke-linecap="round"
                    stroke-dasharray="36 10000"
                    transform="rotate(-93 250 250)"/>
          </svg>

          <!-- Beacon dot at 12 o'clock -->
          <div class="beacon"></div>

          <!-- Center circle -->
          <div class="orbit-center">
            <span class="c-num" id="cNum">[ 01 ]</span>
            <span class="c-title">SERVICES</span>
            <span class="c-sub">DX · SOLUTIONS</span>
          </div>

          <!-- ═══ ORBIT RING — GSAP rotates this ═══ -->
          <div class="orbit-ring" id="orbitRing">

            <!-- Item 0 — top (0°) -->
            <div class="orbit-item active" data-i="0" style="--a:0deg">
              <div class="orbit-inner" id="inner0">
                <div class="node-circle">
                  <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
                       stroke="#0D60B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                    <line x1="8"  y1="21" x2="16" y2="21"/>
                  </svg>
                </div>
                <span class="node-name">Webアプリ開発</span>
              </div>
            </div>

            <!-- Item 1 — lower-right (120°) -->
            <div class="orbit-item dim" data-i="1" style="--a:120deg">
              <div class="orbit-inner" id="inner1">
                <div class="node-circle">
                  <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
                       stroke="#0D60B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3"  width="20" height="7"  rx="1.5"/>
                    <rect x="2" y="12" width="20" height="7"  rx="1.5"/>
                    <circle cx="18" cy="6.5"  r="1.8" fill="#0D60B8" stroke="none"/>
                    <circle cx="18" cy="15.5" r="1.8" fill="#0D60B8" stroke="none"/>
                  </svg>
                </div>
                <span class="node-name">システム開発<br>・クラウド</span>
              </div>
            </div>

            <!-- Item 2 — lower-left (240°) -->
            <div class="orbit-item dim" data-i="2" style="--a:240deg">
              <div class="orbit-inner" id="inner2">
                <div class="node-circle">
                  <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
                       stroke="#0D60B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83
                             2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                             1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                             A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06
                             a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15
                             a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                             A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06
                             a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68
                             a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                             a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06
                             a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9
                             a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                             a1.65 1.65 0 0 0-1.51 1z"/>
                  </svg>
                </div>
                <span class="node-name">DX<br>コンサルティング</span>
              </div>
            </div>

          </div><!-- /orbit-ring -->
        </div><!-- /orbit-stage -->
      </div><!-- /hero-right -->

    </div><!-- /hero-grid -->

    <!-- SCROLL indicator -->
    <div class="scroll-ind">
      <span>SCROLL</span>
      <div class="scroll-line-box"><div class="scroll-line-bar"></div></div>
    </div>

  </div><!-- /hero-frame -->
</section>

<!-- ── spacer ── -->
<div class="spacer">↑ &nbsp;Next Section&nbsp; ↑</div>

<!-- ══ GSAP: CDN primary → local fallback ══ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
        onerror="this.onerror=null;this.src='./gsap.min.js'"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"
        onerror="this.onerror=null;this.src='./ScrollTrigger.min.js'"></script>

<script>
/* ══════════════════════════════════════════════════════════════
   SCROLL-LINKED ORBIT ANIMATION
   ──────────────────────────────────────────────────────────────

   Architecture (CSS rotate + GSAP counter-rotate):

   ┌─ .orbit-ring  ←── GSAP rotates CCW: 0° → -240°
   │   transform-origin: 50% 50%  (center of 500×500 stage)
   │
   ├── .orbit-item[--a=0deg]     ←── CSS: rotate(0) translateY(-170px)
   │   └── .orbit-inner #inner0  ←── GSAP: rotation 0° → +240°
   │
   ├── .orbit-item[--a=120deg]   ←── CSS: rotate(120deg) translateY(-170px)
   │   └── .orbit-inner #inner1  ←── GSAP: rotation -120° → +120°
   │
   └── .orbit-item[--a=240deg]   ←── CSS: rotate(240deg) translateY(-170px)
       └── .orbit-inner #inner2  ←── GSAP: rotation -240° → 0°

   Key insight:
     Every .orbit-inner rotates by the SAME delta (+240°).
     Starting offsets differ by the item's --a value.
     → `gsap.to('.orbit-inner', { rotation: '+=240' })` handles all three.

   Screen-space rotation for any item at any time:
     ring(R) + CSS(A) + inner(I) = 0°   (always upright)
     → I = -(R + A)
     At R=0:    I₀=0, I₁=-120, I₂=-240  (set via gsap.set)
     At R=-240: I₀=240, I₁=120, I₂=0    (after +=240)
══════════════════════════════════════════════════════════════ */

gsap.registerPlugin(ScrollTrigger);

/* ── Data ── */
const DATA = [
  { cNum: '[ 01 ]', wm: '01' },
  { cNum: '[ 02 ]', wm: '02' },
  { cNum: '[ 03 ]', wm: '03' },
];

/* ── DOM ── */
const ring   = document.getElementById('orbitRing');
const items  = [...document.querySelectorAll('.orbit-item')];
const inners = [
  document.getElementById('inner0'),
  document.getElementById('inner1'),
  document.getElementById('inner2'),
];
const cNum = document.getElementById('cNum');
const wm   = document.getElementById('wm');

/* ── Set initial counter-rotations ──
   Each inner must cancel its parent item's CSS --a rotation
   so the icon+label appears upright at time zero.

   transform-origin: 60px 50px = center of the 100px node circle
   within the 120×160 inner div (circle is centred at 60px horiz, 50px vert).
*/
gsap.set(inners[0], { rotation:    0, transformOrigin: '60px 50px' });
gsap.set(inners[1], { rotation: -120, transformOrigin: '60px 50px' });
gsap.set(inners[2], { rotation: -240, transformOrigin: '60px 50px' });

/* ── Step manager ── */
let step = 0;

function setStep(s) {
  s = Math.max(0, Math.min(2, s));
  if (s === step) return;
  step = s;

  /* active / dim classes */
  items.forEach((el, i) => {
    el.classList.toggle('active', i === s);
    el.classList.toggle('dim',    i !== s);
  });

  /* Cross-fade center number + watermark */
  const d = DATA[s];
  gsap.to(cNum, {
    opacity: 0, y: 4, duration: 0.16, ease: 'power1.in',
    onComplete() {
      cNum.textContent = d.cNum;
      gsap.to(cNum, { opacity: 1, y: 0, duration: 0.20, ease: 'power1.out' });
    }
  });
  gsap.to(wm, {
    opacity: 0, duration: 0.18,
    onComplete() {
      wm.textContent = d.wm;
      gsap.to(wm, { opacity: 1, duration: 0.22 });
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   GSAP TIMELINE + SCROLLTRIGGER

   ScrollTrigger config:
     pin: true   — locks viewport while scrolling through steps
     scrub: 1    — 1 s smooth lag (physical, responsive feel)
     snap: [0, 0.5, 1]  — locks to nearest step on scroll-stop
     end: +=200vh        — 2 steps × 100vh each

   Timeline tweens (all at position 0, run in parallel):
     1. Ring   : rotation 0 → -240° (CCW, 120° per step)
     2. Inners : rotation +=240° (each from its initial offset)
══════════════════════════════════════════════════════════════ */

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#hero',
    start:   'top top',
    end:     '+=200vh',
    pin:     true,
    scrub:   1,
    snap: {
      snapTo:   [0, 0.5, 1],
      duration: { min: 0.3, max: 0.65 },
      ease:     'power2.inOut',
    },
    onUpdate(self) {
      /* Round progress to nearest step: 0 / 0.5 / 1 → steps 0 / 1 / 2 */
      setStep(Math.min(2, Math.round(self.progress * 2)));
    },
  },
});

/* Tween 1 — ring CCW */
tl.to(ring, {
  rotation: -240,
  ease: 'none',
}, 0);

/* Tween 2 — counter-rotate all inners by +240° */
tl.to(inners, {
  rotation: '+=240',
  ease: 'none',
}, 0);
</script>
</body>
</html>
