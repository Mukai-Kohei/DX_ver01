<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Service Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: auto; }

body {
  font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
  background: #0a0e1a;
}

/* ── Spacer sections ── */
.spacer {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d1220;
  color: rgba(255,255,255,0.25);
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════════
   PINNED SERVICE SECTION
══════════════════════════════════════════ */
#serviceSection {
  /* height controlled by GSAP pin spacer */
}

.service-sticky {
  height: 100vh;
  display: flex;
  align-items: center;
  background: linear-gradient(135deg, #1A60C8 0%, #2196F3 45%, #42B4F8 72%, #72CBFF 100%);
  overflow: hidden;
  position: relative;
}

/* Grid overlay */
.service-sticky::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* Vignette */
.service-sticky::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 38%, rgba(8,35,100,0.28) 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── 2-column layout ── */
.service-layout {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}

/* ══════════════════════════════════════════
   LEFT: TEXT PANEL
══════════════════════════════════════════ */
.text-panel {
  color: #fff;
}

.section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 28px;
}

.svc-counter-wrap {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 4px;
}

.svc-num {
  font-size: 72px;
  font-weight: 800;
  line-height: 1;
  color: #fff;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.svc-total {
  font-size: 20px;
  font-weight: 400;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.05em;
}

.svc-title {
  font-size: clamp(22px, 2.6vw, 34px);
  font-weight: 700;
  line-height: 1.3;
  color: #fff;
  margin-bottom: 18px;
}

.svc-desc {
  font-size: 15px;
  line-height: 1.95;
  color: rgba(255,255,255,0.82);
  max-width: 420px;
}

/* Cross-fade state */
.text-fade-out {
  opacity: 0 !important;
  transform: translateY(10px) !important;
}

.svc-num,
.svc-title,
.svc-desc {
  transition: opacity 0.28s ease, transform 0.28s ease;
}

/* Progress dots */
.progress-dots {
  display: flex;
  gap: 8px;
  margin-top: 36px;
}

.pdot {
  height: 3px;
  width: 24px;
  border-radius: 2px;
  background: rgba(255,255,255,0.22);
  transition: background 0.4s, width 0.4s;
}

.pdot.on {
  background: #fff;
  width: 44px;
}

/* ══════════════════════════════════════════
   RIGHT: ORBIT DIAGRAM
══════════════════════════════════════════ */
.orbit-diagram {
  display: flex;
  align-items: center;
  justify-content: center;
}

.orbit-wrap {
  position: relative;
  width: 500px;
  height: 500px;
  flex-shrink: 0;
}

/* Outer glow circle */
.orbit-bg-circle {
  position: absolute;
  inset: 16px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    rgba(140,210,255,0.11) 0%,
    rgba(100,170,255,0.04) 55%,
    transparent 100%);
  border: 1px solid rgba(255,255,255,0.10);
}

/* Dashed ring */
.orbit-ring {
  position: absolute;
  /* r=185, center=250,250 → inset = 250-185 = 65 */
  inset: 65px;
  border-radius: 50%;
  border: 1.5px dashed rgba(255,255,255,0.20);
}

/* Highlight beacon at top */
.orbit-highlight {
  position: absolute;
  /* top node center: left=250, top=65 → adjusted for 14px element */
  top: 58px;
  left: 243px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  box-shadow: 0 0 14px 4px rgba(180,230,255,0.45);
}

/* Center circle */
.orbit-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 126px;
  height: 126px;
  border-radius: 50%;
  background: rgba(140,205,255,0.48);
  border: 1.5px solid rgba(220,240,255,0.68);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 3px;
  box-shadow: 0 0 28px rgba(100,180,255,0.20), inset 0 1px 0 rgba(255,255,255,0.18);
  z-index: 2;
}

.c-num {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(10,50,120,0.80);
  font-weight: 700;
}

.c-name {
  font-size: 12px;
  font-weight: 700;
  color: #0D47A1;
  line-height: 1.45;
  white-space: pre-line;
  text-align: center;
}

.c-sub {
  font-size: 8px;
  letter-spacing: 0.15em;
  color: rgba(10,50,120,0.55);
  text-transform: uppercase;
  margin-top: 1px;
}

/* ── Rotating ring ── */
.orbit-rotating {
  position: absolute;
  inset: 0;
  transform-origin: 250px 250px;
}

/* ── Nodes ── */
.orbit-node {
  position: absolute;
  width: 104px;
  height: 104px;
  margin: -52px; /* offset so left/top positions refer to center */
}

/* Initial positions (r=185 from center 250,250) */
/* top:    left=250px, top=65px  */
/* br:     left=410px, top=343px (angle 30° std) */
/* bl:     left= 90px, top=343px (angle 150° std) */
.orbit-node[data-pos="top"] { left: 250px; top:  65px; }
.orbit-node[data-pos="br"]  { left: 410px; top: 343px; }
.orbit-node[data-pos="bl"]  { left:  90px; top: 343px; }

.node-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: rgba(140,205,255,0.38);
  border: 1.5px solid rgba(220,240,255,0.55);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: background 0.45s ease, border-color 0.45s ease,
              box-shadow 0.45s ease, transform 0.45s ease;
  transform-origin: center;
}

.orbit-node.is-active .node-inner {
  background: rgba(190,230,255,0.62);
  border-color: rgba(255,255,255,0.82);
  box-shadow: 0 0 22px rgba(180,225,255,0.52);
  transform: scale(1.14);
}

.node-label {
  font-size: 9.5px;
  font-weight: 600;
  color: rgba(255,255,255,0.72);
  text-align: center;
  line-height: 1.3;
  white-space: pre-line;
  /* stays upright due to JS counter-rotation */
}

.orbit-node.is-active .node-label {
  color: #fff;
}
</style>
</head>
<body>

<!-- Spacer before -->
<div class="spacer">↓ Scroll Down ↓</div>

<!-- ── Pinned service section ── -->
<section id="serviceSection">
  <div class="service-sticky">
    <div class="service-layout">

      <!-- LEFT: Text -->
      <div class="text-panel">
        <p class="section-label">[ Services ] &nbsp;DX · Solutions</p>

        <div class="svc-counter-wrap">
          <span class="svc-num" id="svcNum">01</span>
          <span class="svc-total">&thinsp;/ 03</span>
        </div>

        <h2 class="svc-title" id="svcTitle">Webアプリ開発</h2>
        <p class="svc-desc" id="svcDesc">モダンな技術スタックを駆使し、スケーラブルなWebアプリケーションを設計・開発します。ユーザー体験を最優先に、ビジネス成長を支える高品質なシステムを提供します。</p>

        <div class="progress-dots">
          <div class="pdot on"></div>
          <div class="pdot"></div>
          <div class="pdot"></div>
        </div>
      </div>

      <!-- RIGHT: Orbit -->
      <div class="orbit-diagram">
        <div class="orbit-wrap">

          <div class="orbit-bg-circle"></div>
          <div class="orbit-ring"></div>
          <div class="orbit-highlight"></div>

          <!-- Center circle (static) -->
          <div class="orbit-center">
            <span class="c-num" id="cNum">[ 01 ]</span>
            <span class="c-name" id="cName">Webアプリ
開発</span>
            <span class="c-sub">DX · Services</span>
          </div>

          <!-- Rotating container -->
          <div class="orbit-rotating" id="orbitRotating">

            <!-- Node 0: top (step 0 active) -->
            <div class="orbit-node is-active" data-pos="top" data-index="0">
              <div class="node-inner">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                     stroke="#0D60B8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                  <line x1="8"  y1="21" x2="16" y2="21"/>
                </svg>
                <span class="node-label">Web開発</span>
              </div>
            </div>

            <!-- Node 1: bottom-right -->
            <div class="orbit-node" data-pos="br" data-index="1">
              <div class="node-inner">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                     stroke="#0D60B8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3"  width="20" height="7"  rx="1.5"/>
                  <rect x="2" y="12" width="20" height="7"  rx="1.5"/>
                  <circle cx="18" cy="6.5"  r="1.5" fill="#0D60B8"/>
                  <circle cx="18" cy="15.5" r="1.5" fill="#0D60B8"/>
                </svg>
                <span class="node-label">システム開発<br>クラウド</span>
              </div>
            </div>

            <!-- Node 2: bottom-left -->
            <div class="orbit-node" data-pos="bl" data-index="2">
              <div class="node-inner">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                     stroke="#0D60B8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83
                           M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                </svg>
                <span class="node-label">DXコンサル<br>ティング</span>
              </div>
            </div>

          </div><!-- /orbit-rotating -->
        </div><!-- /orbit-wrap -->
      </div><!-- /orbit-diagram -->

    </div><!-- /service-layout -->
  </div><!-- /service-sticky -->
</section>

<!-- Spacer after -->
<div class="spacer">↑ Next Section ↑</div>

<script src="./gsap.min.js"></script>
<script src="./ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

/* ── Service data ── */
const SERVICES = [
  {
    num:   '01',
    title: 'Webアプリ開発',
    desc:  'モダンな技術スタックを駆使し、スケーラブルなWebアプリケーションを設計・開発します。ユーザー体験を最優先に、ビジネス成長を支える高品質なシステムを提供します。',
    cNum:  '[ 01 ]',
    cName: 'Webアプリ\n開発',
  },
  {
    num:   '02',
    title: 'システム開発・クラウド',
    desc:  'クラウドネイティブなアーキテクチャで企業の基幹システムをモダン化します。AWS・GCPを活用し、安定性とコスト効率を両立したインフラを構築します。',
    cNum:  '[ 02 ]',
    cName: 'システム開発\nクラウド',
  },
  {
    num:   '03',
    title: 'DXコンサルティング',
    desc:  'デジタル変革の戦略立案から実装まで一貫して支援します。業務プロセスの可視化・自動化により、企業の生産性と競争力を高めます。',
    cNum:  '[ 03 ]',
    cName: 'DXコンサル\nティング',
  },
];

/* ── DOM refs ── */
const rotating  = document.getElementById('orbitRotating');
const allNodes  = document.querySelectorAll('.orbit-node');
const nodeInners = document.querySelectorAll('.node-inner');
const dots      = document.querySelectorAll('.pdot');

const svcNum  = document.getElementById('svcNum');
const svcTitle = document.getElementById('svcTitle');
const svcDesc  = document.getElementById('svcDesc');
const cNum    = document.getElementById('cNum');
const cName   = document.getElementById('cName');
const FADE_ELS = [svcNum, svcTitle, svcDesc];

let currentStep = 0;

/* ── UI update with cross-fade ── */
function updateUI(step) {
  step = Math.max(0, Math.min(2, step));
  if (step === currentStep) return;
  currentStep = step;

  const s = SERVICES[step];

  /* progress dots */
  dots.forEach((d, i) => d.classList.toggle('on', i === step));

  /* active node */
  allNodes.forEach((n, i) => n.classList.toggle('is-active', i === step));

  /* fade out */
  FADE_ELS.forEach(el => el.classList.add('text-fade-out'));

  setTimeout(() => {
    svcNum.textContent  = s.num;
    svcTitle.textContent = s.title;
    svcDesc.textContent  = s.desc;
    cNum.textContent    = s.cNum;
    cName.textContent   = s.cName;  /* white-space:pre-line handles \n */

    /* fade in */
    FADE_ELS.forEach(el => el.classList.remove('text-fade-out'));
  }, 280);
}

/* ── GSAP: pin + scrub ── */
const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#serviceSection',
    start:   'top top',
    end:     '+=200vh',   /* pin for 200vh = 2 steps × 100vh */
    pin:     true,
    scrub:   1.5,
    snap: {
      snapTo:   [0, 0.5, 1],
      duration: { min: 0.25, max: 0.55 },
      ease:     'power2.inOut',
    },
    onUpdate(self) {
      /* step: 0 → 0.49 = 0,  0.5 → 0.99 = 1,  1.0 = 2 */
      const step = Math.min(2, Math.round(self.progress * 2));
      updateUI(step);
    },
  },
});

/* Ring CCW: 0 → -240° (2 steps × 120° per step) */
tl.to(rotating, { rotation: -240, ease: 'none' }, 0);

/* Counter-rotate node-inner so icons stay upright */
tl.to(nodeInners, { rotation: 240, ease: 'none' }, 0);
</script>
</body>
</html>
